<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无碍AI - AIGC视频制作Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* === RESET & BASE === */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f5f2ed;--sidebar-bg:#ece8e1;--card-bg:#ffffff;
  --text:#2c2a27;--text-secondary:#7a7670;--text-light:#a09a92;
  --accent:#4db6ac;--accent2:#3a9e91;--accent-glow:rgba(77,182,172,0.25);
  --user-bubble:#3d3a35;--agent-bubble:#ffffff;
  --border:rgba(0,0,0,0.06);--shadow:0 2px 12px rgba(0,0,0,0.06);
  --radius:12px;
}
html,body{height:100%;font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;font-size:14px;}

/* === LAYOUT === */
.app{display:flex;height:100vh;position:relative;}

/* watermark */
.watermark{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:420px;height:420px;opacity:0.07;pointer-events:none;z-index:0;background:url('logo.png') center/contain no-repeat;}

/* === LEFT SIDEBAR === */
.sidebar{width:232px;min-width:232px;background:var(--sidebar-bg);display:flex;flex-direction:column;border-right:1px solid var(--border);z-index:2;position:relative;}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:20px 18px 16px;}
.sidebar-logo img{width:auto;height:28px;object-fit:contain;}
.sidebar-logo span{font-size:17px;font-weight:700;color:var(--text);letter-spacing:0.5px;}
.new-task-btn{margin:0 14px 14px;padding:11px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,#4db6ac,#3a9e91);color:#fff;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .25s;box-shadow:0 3px 14px var(--accent-glow);position:relative;overflow:hidden;}
.new-task-btn:hover{transform:translateY(-1px);box-shadow:0 5px 20px var(--accent-glow);}
.new-task-btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.15) 50%,transparent 60%);animation:btnShine 3s infinite;}
@keyframes btnShine{0%{transform:translateX(-100%) rotate(25deg)}100%{transform:translateX(100%) rotate(25deg)}}

.nav-section{padding:8px 14px;}
.nav-section-title{font-size:11px;color:var(--text-light);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-secondary);transition:all .2s;}
.nav-item:hover,.nav-item.active{background:rgba(0,0,0,0.05);color:var(--text);}
.nav-item svg{width:17px;height:17px;opacity:.6;}

.history-section{flex:1;overflow-y:auto;padding:6px 14px;}
.history-section::-webkit-scrollbar{width:3px;}
.history-section::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:3px;}
.history-item{padding:8px 10px;border-radius:8px;font-size:12.5px;color:var(--text-secondary);cursor:pointer;transition:all .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.history-item:hover{background:rgba(0,0,0,0.05);}
.history-item.active{background:rgba(77,182,172,0.1);color:var(--accent2);}

.sidebar-bottom{border-top:1px solid var(--border);padding:12px 14px;}
.credits-box{background:rgba(255,255,255,0.6);border-radius:10px;padding:12px;margin-bottom:10px;}
.credits-label{font-size:11px;color:var(--text-light);margin-bottom:4px;}
.credits-value{font-size:18px;font-weight:700;color:var(--text);}
.credits-bar{height:4px;background:rgba(0,0,0,0.08);border-radius:4px;margin-top:6px;overflow:hidden;}
.credits-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width 1s ease;}
.recharge-btn{width:100%;margin-top:8px;padding:7px;border:1px solid var(--accent);border-radius:8px;background:transparent;color:var(--accent2);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;}
.recharge-btn:hover{background:var(--accent);color:#fff;}

.sidebar-icons{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.sidebar-icons .icon-btn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all .2s;position:relative;}
.sidebar-icons .icon-btn:hover{background:rgba(0,0,0,0.06);}
.badge-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:#e55;border-radius:50%;border:1.5px solid var(--sidebar-bg);}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#81c9c0);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;}

/* === CENTER CHAT === */
.chat-area{flex:1;display:flex;flex-direction:column;position:relative;z-index:1;min-width:0;}
.chat-header{padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(245,242,237,0.8);backdrop-filter:blur(10px);display:flex;align-items:center;gap:10px;}
.chat-header-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.chat-header span{font-size:14px;font-weight:500;}
.header-login-btn{margin-left:auto;border:1px solid rgba(77,182,172,.35);background:rgba(255,255,255,.68);color:var(--accent2);border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:700;cursor:pointer;transition:all .2s;}
.header-login-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 8px 18px var(--accent-glow);}

.chat-messages{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:16px;}
.chat-messages::-webkit-scrollbar{width:4px;}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:4px;}

/* welcome hints - REPLACED by landing */
.welcome-hints{display:none;}

/* === LANDING SCREEN === */
.landing-overlay{position:absolute;inset:0;z-index:50;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s ease,transform .6s ease;padding-bottom:40px;}
.landing-overlay.hide{opacity:0;transform:translateY(-20px) scale(0.98);pointer-events:none;}
.landing-logo-big{width:72px;margin-bottom:28px;opacity:0;transform:translateY(16px);animation:landFadeIn .8s .2s ease forwards;}
.landing-greeting{font-size:32px;font-weight:700;color:var(--text);opacity:0;transform:translateY(16px);animation:landFadeIn .8s .5s ease forwards;}
.landing-sub{font-size:18px;color:var(--text-light);margin-top:8px;font-weight:300;opacity:0;transform:translateY(16px);animation:landFadeIn .8s .8s ease forwards;}
@keyframes landFadeIn{to{opacity:1;transform:translateY(0)}}

.landing-prompts{margin-top:36px;height:34px;overflow:hidden;position:relative;width:520px;max-width:90%;text-align:center;opacity:0;animation:landFadeIn .8s 1.1s ease forwards;}
.landing-prompts-track{display:flex;flex-direction:column;animation:landPromptScroll 16s 1.6s infinite;}
.landing-prompts-track span{height:34px;line-height:34px;font-size:15px;color:var(--accent2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@keyframes landPromptScroll{
  0%,10%{transform:translateY(0)}
  12.5%,22.5%{transform:translateY(-34px)}
  25%,35%{transform:translateY(-68px)}
  37.5%,47.5%{transform:translateY(-102px)}
  50%,60%{transform:translateY(-136px)}
  62.5%,72.5%{transform:translateY(-170px)}
  75%,85%{transform:translateY(-204px)}
  87.5%,97.5%{transform:translateY(-238px)}
  100%{transform:translateY(-238px)}
}

.landing-input-ghost{margin-top:32px;width:440px;max-width:85%;opacity:0;animation:landFadeIn .8s 1.4s ease forwards;}
.landing-input-inner{display:flex;align-items:center;gap:10px;background:var(--card-bg);border-radius:14px;padding:4px 6px 4px 16px;box-shadow:0 2px 16px rgba(0,0,0,0.06);border:1px solid var(--border);}
.landing-input-inner input{flex:1;border:none;outline:none;background:transparent;font-size:14px;font-family:inherit;color:var(--text);padding:12px 0;}
.landing-input-inner input::placeholder{color:var(--text-light);}
.landing-input-inner .send-btn{width:38px;height:38px;}
.upload-btn{width:38px;height:38px;border-radius:10px;border:1px solid rgba(77,182,172,.25);background:rgba(77,182,172,.08);color:var(--accent2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .22s;position:relative;flex:none;}
.upload-btn:hover,.upload-btn.selected{background:rgba(77,182,172,.16);border-color:var(--accent);box-shadow:0 6px 16px rgba(77,182,172,.16);}
.upload-btn svg{width:17px;height:17px;}
.upload-tooltip{position:absolute;right:0;bottom:48px;width:210px;padding:10px 12px;border-radius:10px;background:#fff;color:var(--text);font-size:12px;line-height:1.5;box-shadow:0 10px 28px rgba(42,39,34,.16);border:1px solid rgba(0,0,0,.06);opacity:0;transform:translateY(6px);pointer-events:none;transition:all .18s;text-align:left;z-index:20;}
.upload-tooltip b{display:block;font-size:12px;margin-bottom:2px;}
.upload-tooltip span{color:var(--text-light);}
.upload-btn:hover .upload-tooltip,.upload-btn:focus-visible .upload-tooltip{opacity:1;transform:translateY(0);}
.file-picker{display:none;}

/* logged-out state */
.logged-out .logged-in-only{display:none!important;}
.logged-out .new-task-btn{background:linear-gradient(135deg,#b9b3aa,#9f978c);box-shadow:none;}
.logged-out .new-task-btn:hover{transform:none;box-shadow:none;}
.locked-sidebar-card{background:rgba(255,255,255,.66);border:1px solid rgba(0,0,0,.06);border-radius:10px;padding:12px;margin-top:8px;}
.locked-sidebar-card b{display:block;font-size:13px;color:var(--text);margin-bottom:5px;}
.locked-sidebar-card p{font-size:11.5px;line-height:1.55;color:var(--text-secondary);}
.locked-sidebar-card button{width:100%;margin-top:10px;border:none;border-radius:8px;padding:8px 10px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer;}
.locked-sidebar-card button:hover{background:var(--accent2);}
.locked-hint{margin-top:18px;font-size:12.5px;color:var(--text-light);text-align:center;opacity:0;animation:landFadeIn .8s 1.7s ease forwards;}
.auth-modal{position:fixed;inset:0;z-index:3000;display:grid;place-items:center;background:rgba(32,30,27,.36);backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .22s ease;padding:20px;}
.auth-modal.show{opacity:1;pointer-events:auto;}
.auth-card{width:min(430px,94vw);border-radius:16px;background:#fff;box-shadow:0 28px 90px rgba(42,39,34,.28);border:1px solid rgba(255,255,255,.72);overflow:hidden;transform:translateY(12px) scale(.98);transition:transform .22s ease;}
.auth-modal.show .auth-card{transform:translateY(0) scale(1);}
.auth-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:22px 22px 14px;border-bottom:1px solid rgba(0,0,0,.06);background:linear-gradient(180deg,#fff,#fbfaf7);}
.auth-eyebrow{font-size:11px;font-weight:800;color:var(--accent2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.auth-title{font-size:20px;font-weight:800;color:var(--text);}
.auth-sub{font-size:12.5px;color:var(--text-secondary);line-height:1.7;margin-top:7px;}
.auth-close{width:32px;height:32px;border:none;border-radius:9px;background:rgba(0,0,0,.05);color:var(--text-secondary);font-size:22px;line-height:1;cursor:pointer;}
.auth-body{padding:18px 22px 22px;}
.auth-switch{display:flex;background:rgba(0,0,0,.05);border-radius:10px;padding:3px;margin-bottom:14px;}
.auth-switch button{flex:1;border:none;border-radius:8px;background:transparent;color:var(--text-secondary);font-size:12.5px;font-weight:700;padding:8px;cursor:pointer;}
.auth-switch button.active{background:#fff;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.auth-field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.auth-field label{font-size:12px;font-weight:700;color:var(--text-secondary);}
.auth-input-row{display:flex;align-items:center;border:1px solid rgba(0,0,0,.1);border-radius:10px;background:#fff;overflow:hidden;}
.auth-prefix{padding:0 11px;border-right:1px solid rgba(0,0,0,.08);color:var(--text-secondary);font-weight:700;font-size:13px;}
.auth-field input{width:100%;height:42px;border:none;outline:none;background:transparent;padding:0 12px;font:inherit;color:var(--text);}
.auth-field input::placeholder{color:var(--text-light);}
.auth-tip{font-size:11.5px;color:var(--text-light);line-height:1.55;margin-top:-4px;margin-bottom:12px;}
.auth-error{min-height:20px;font-size:12px;color:#c54b42;font-weight:700;margin:4px 0 10px;}
.auth-primary{width:100%;height:42px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:800;cursor:pointer;box-shadow:0 10px 22px var(--accent-glow);}
.auth-primary:disabled{background:#c8c3bb;color:#f6f4ef;cursor:not-allowed;box-shadow:none;}
.auth-link-row{text-align:center;margin-top:14px;font-size:12.5px;color:var(--text-secondary);}
.auth-link-row button{border:none;background:transparent;color:var(--accent2);font-weight:800;cursor:pointer;}
.auth-pane{display:none;}
.auth-pane.active{display:block;}

/* transition flash */
.transition-flash{position:fixed;inset:0;z-index:100;background:var(--bg);opacity:0;pointer-events:none;transition:opacity .4s;}
.transition-flash.show{opacity:1;pointer-events:auto;}

/* input bar */
.chat-input-bar{padding:14px 24px 18px;border-top:1px solid var(--border);background:rgba(245,242,237,0.9);backdrop-filter:blur(8px);}
.chat-input-wrap{display:flex;align-items:center;gap:10px;background:var(--card-bg);border-radius:14px;padding:4px 6px 4px 16px;box-shadow:0 1px 8px rgba(0,0,0,0.05);}
.chat-input-wrap input{flex:1;border:none;outline:none;background:transparent;font-size:13.5px;font-family:inherit;color:var(--text);padding:10px 0;}
.chat-input-wrap input::placeholder{color:var(--text-light);}
.send-btn{width:36px;height:36px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.send-btn:hover{transform:scale(1.05);}
.send-btn svg{width:17px;height:17px;}

</style>
</head>
<body>
<div class="transition-flash" id="transFlash"></div>
<input class="file-picker" id="imagePicker" type="file" accept="image/*">
<div class="watermark"></div>
<div class="app logged-out">
<!-- LEFT SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo"><img src="logo.png" alt="logo"><span>无碍AI</span></div>
  <button class="new-task-btn auth-trigger" type="button">登录后新建任务</button>
  <div class="nav-section">
    <div class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h7"/></svg>工作台</div>
  </div>
  <div class="sidebar-bottom">
    <div class="locked-sidebar-card">
      <b>当前未登录</b>
      <button class="auth-trigger" type="button">去登录</button>
    </div>

  </div>
</aside>

<!-- CENTER CHAT -->
<main class="chat-area">
  <div class="chat-header"><div class="chat-header-dot"></div><span>无碍 Agent · 未登录</span><button class="header-login-btn auth-trigger" type="button">登录 / 注册</button></div>
  <div class="chat-messages" id="chatMessages">
  </div>
  <!-- Landing overlay inside chat area -->
  <div class="landing-overlay" id="landingOverlay">
    <img class="landing-logo-big" src="logo.png" alt="">
    <div class="landing-greeting">Hello，陌生人，请登录</div>
    <div class="landing-sub">未登录状态暂时无法使用无碍AI创作能力</div>
    <div class="landing-prompts">
      <div class="landing-prompts-track">
        <span>"登录后可描述需求，生成旅行视频"</span>
        <span>"登录后可上传图片，生成产品宣传片"</span>
        <span>"登录后可进入素材云盘与历史任务"</span>
        <span>"登录后可继续使用数字人播报能力"</span>
        <span>"登录后可制作音乐MV与品牌故事"</span>
        <span>"当前仅可浏览首页，创作功能已锁定"</span>
        <span>"请先登录，再开始一次新的创作"</span>
        <span>"登录后可描述需求，生成旅行视频"</span>
      </div>
    </div>
    <div class="landing-input-ghost">
      <div class="landing-input-inner">
        <input type="text" id="landingInput" class="auth-trigger" placeholder="登录后即可描述你想制作的视频..." readonly>
        <button class="send-btn" id="landingSend" aria-label="发送"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
        <button class="upload-btn upload-trigger" type="button" aria-label="上传图片"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="m21 15-5-5L5 19"/></svg><span class="upload-tooltip"><b>请先登录</b><span>登录后才能上传 JPG / PNG 并发送需求。</span></span></button>
      </div>
    </div>
  </div>
  <div class="chat-input-bar">
    <div class="chat-input-wrap">
      <input type="text" id="chatInput" class="auth-trigger" placeholder="请先登录，再描述你想制作的宣传视频..." readonly>
      <button class="send-btn" id="chatSend" aria-label="发送"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      <button class="upload-btn upload-trigger" type="button" aria-label="上传图片"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="m21 15-5-5L5 19"/></svg><span class="upload-tooltip"><b>请先登录</b><span>登录后才能上传图片并开始生成。</span></span></button>
    </div>
  </div>
</main>

</div>

<div class="auth-modal" id="authModal" aria-hidden="true">
  <div class="auth-card" role="dialog" aria-modal="true" aria-labelledby="authTitle">
    <div class="auth-head">
      <div>
        <div class="auth-eyebrow" id="authEyebrow">登录后继续</div>
        <div class="auth-title" id="authTitle">去登录无碍AI</div>
        <div class="auth-sub" id="authSub">当前为未登录状态，输入、上传和生成能力暂不可用。</div>
      </div>
      <button class="auth-close" id="authClose" type="button" aria-label="关闭">×</button>
    </div>
    <div class="auth-body">
      <div class="auth-pane active" id="loginPane">
        <div class="auth-switch" aria-label="登录方式">
          <button class="active" type="button" data-login-mode="phone">手机号登录</button>
          <button type="button" data-login-mode="email">邮箱密码登录</button>
        </div>
        <form id="loginForm" novalidate>
          <div class="auth-field" id="phoneLoginFields">
            <label for="loginPhone">手机号</label>
            <div class="auth-input-row"><span class="auth-prefix">+86</span><input id="loginPhone" type="tel" inputmode="tel" placeholder="请输入手机号"></div>
          </div>
          <div id="emailLoginFields" style="display:none">
            <div class="auth-field">
              <label for="loginEmail">邮箱地址</label>
              <div class="auth-input-row"><input id="loginEmail" type="email" placeholder="name@example.com"></div>
            </div>
          </div>
          <div class="auth-field">
            <label for="loginPassword">密码</label>
            <div class="auth-input-row"><input id="loginPassword" type="password" placeholder="请输入密码"></div>
          </div>
          <div class="auth-error" id="loginError" aria-live="polite"></div>
          <button class="auth-primary" type="submit">登录</button>
        </form>
        <div class="auth-link-row">没有账号？<button id="showRegister" type="button">点击注册</button></div>
      </div>

      <div class="auth-pane" id="registerPane">
        <form id="registerForm" novalidate>
          <div class="auth-field">
            <label for="registerEmail">邮箱地址</label>
            <div class="auth-input-row"><input id="registerEmail" type="email" placeholder="name@example.com"></div>
          </div>
          <div class="auth-field">
            <label for="inviteCode">邀请码</label>
            <div class="auth-input-row"><input id="inviteCode" type="text" placeholder="请输入邀请码"></div>
          </div>
          <div class="auth-tip">无邀请码请联系开发者：+86-15950171201</div>
          <div class="auth-error" id="registerError" aria-live="polite"></div>
          <button class="auth-primary" id="sendCodeBtn" type="submit" disabled>发送验证码</button>
        </form>
        <div class="auth-link-row">已有账号？<button id="showLogin" type="button">返回登录</button></div>
      </div>
    </div>
  </div>
</div>

<script>
const authModal = document.getElementById('authModal');
const authClose = document.getElementById('authClose');
const authEyebrow = document.getElementById('authEyebrow');
const authTitle = document.getElementById('authTitle');
const authSub = document.getElementById('authSub');
const loginPane = document.getElementById('loginPane');
const registerPane = document.getElementById('registerPane');
const loginError = document.getElementById('loginError');
const registerError = document.getElementById('registerError');
const inviteCode = document.getElementById('inviteCode');
const sendCodeBtn = document.getElementById('sendCodeBtn');

function setAuthCopy(mode){
  if(mode==='register'){
    authEyebrow.textContent='创建账号';
    authTitle.textContent='注册无碍AI';
    authSub.textContent='注册需要有效邀请码。未获得邀请码时，请先联系开发者。';
  }else{
    authEyebrow.textContent='登录后继续';
    authTitle.textContent='去登录无碍AI';
    authSub.textContent='当前为未登录状态，输入、上传和生成能力暂不可用。';
  }
}

function showAuthPane(mode){
  const isRegister=mode==='register';
  loginPane.classList.toggle('active',!isRegister);
  registerPane.classList.toggle('active',isRegister);
  loginError.textContent='';
  registerError.textContent='';
  setAuthCopy(mode);
}

function openAuthModal(mode){
  showAuthPane(mode||'login');
  authModal.classList.add('show');
  authModal.setAttribute('aria-hidden','false');
  const first=authModal.querySelector('.auth-pane.active input');
  setTimeout(()=>first&&first.focus(),80);
}

function closeAuthModal(){
  authModal.classList.remove('show');
  authModal.setAttribute('aria-hidden','true');
}

function blockForLogin(e){
  if(e)e.preventDefault();
  openAuthModal('login');
}

document.querySelectorAll('.auth-trigger,#landingSend,#chatSend,.upload-trigger').forEach(el=>{
  el.addEventListener('click',blockForLogin);
  if(el.matches('input'))el.addEventListener('focus',blockForLogin);
});

document.querySelectorAll('#landingInput,#chatInput').forEach(input=>{
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter')blockForLogin(e);
  });
});

document.querySelectorAll('.upload-trigger').forEach(btn=>{
  btn.addEventListener('dragover',e=>{e.preventDefault();openAuthModal('login');});
  btn.addEventListener('drop',e=>{e.preventDefault();openAuthModal('login');});
});

document.getElementById('imagePicker').addEventListener('change',e=>{
  e.target.value='';
  openAuthModal('login');
});

document.querySelectorAll('[data-login-mode]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-login-mode]').forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    const isEmail=btn.dataset.loginMode==='email';
    document.getElementById('phoneLoginFields').style.display=isEmail?'none':'flex';
    document.getElementById('emailLoginFields').style.display=isEmail?'block':'none';
    loginError.textContent='';
  });
});

document.getElementById('loginForm').addEventListener('submit',e=>{
  e.preventDefault();
  loginError.textContent='密码错误，请重试。';
});

document.getElementById('showRegister').addEventListener('click',()=>showAuthPane('register'));
document.getElementById('showLogin').addEventListener('click',()=>showAuthPane('login'));
authClose.addEventListener('click',closeAuthModal);
authModal.addEventListener('click',e=>{if(e.target===authModal)closeAuthModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&authModal.classList.contains('show'))closeAuthModal();});

inviteCode.addEventListener('input',()=>{
  sendCodeBtn.disabled=inviteCode.value.trim().length===0;
  registerError.textContent='';
});

document.getElementById('registerForm').addEventListener('submit',e=>{
  e.preventDefault();
  if(sendCodeBtn.disabled)return;
  registerError.textContent='验证码不存在。';
});
</script>
</body>
</html>
